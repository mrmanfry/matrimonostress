<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nozze Senza Stress — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f0eb;
      color: #171717;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .container { max-width: 360px; }
    .icon {
      width: 64px; height: 64px; margin: 0 auto 1.5rem;
      opacity: 0.5;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #555; line-height: 1.6; font-size: 0.95rem; }
    .retry {
      display: inline-block; margin-top: 1.5rem; padding: 0.75rem 1.5rem;
      background: #4f46e5; color: #fff; border: none; border-radius: 0.75rem;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      text-decoration: none;
    }
    .retry:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"></line>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
      <line x1="12" y1="20" x2="12.01" y2="20"></line>
    </svg>
    <h1>Sei Offline</h1>
    <p>Torna online per accedere a questa pagina. I tuoi dati sono al sicuro.</p>
    <a href="/" class="retry" onclick="window.location.reload(); return false;">Riprova</a>
  </div>
</body>
</html>
